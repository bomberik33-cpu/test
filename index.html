<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Szpont — druzyna CS2</title>
<meta name="description" content="Project Szpont — druzyna Counter-Strike 2. Sklad, najblizsze mecze, wyniki i bilans ligowy aktualizowane na zywo z FACEIT.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<a class="skip-link" href="#glowna-tresc">Przejdz do tresci</a>

<header class="topbar" id="gora">
</header>

<main id="glowna-tresc">

  <!-- ============================== HERO ============================== -->
  <section class="intro">
    <div class="row">
      <div class="title-row">
        <h1 class="headline">PROJECT SZPONT</h1>
  </section>

  <!-- ============================== SKLAD ============================== -->
  <section class="block block--tight" id="sklad">
    <div class="row">
      <div class="roster" id="rosterGrid">
        <p class="loading">Wczytywanie skladu…</p>
      </div>
    </div>
  </section>

  <!-- ============================== PASEK: NAJBLIZSZY MECZ + LIGA ============================== -->
  <section class="block block--tight" id="liga">
    <div class="row dash">
      <div class="dash-figures" id="leagueStats">
        <p class="loading">Wczytywanie statystyk…</p>
      </div>
      <div class="next-match" id="heroNextMatch">
        <p class="loading">Wczytywanie najblizszego meczu…</p>
      </div>
    </div>
  </section>

  <!-- ============================== MECZE + WYNIKI (obok siebie) ============================== -->
  <section class="block" id="mecze-wyniki">
    <div class="row games-split">
      <div class="games-col" id="mecze">
        <div class="block-head block-head--sub">
          <span class="num">01</span>
          <h2 class="block-title">Najblizsze mecze</h2>
        </div>
        <ul class="games" id="upcomingList">
          <li class="loading">Wczytywanie terminarza…</li>
        </ul>
      </div>

      <div class="games-col" id="wyniki">
        <div class="block-head block-head--sub">
          <span class="num">02</span>
          <h2 class="block-title">Ostatnie wyniki</h2>
        </div>
        <ul class="games" id="resultsList">
          <li class="loading">Wczytywanie wyników…</li>
        </ul>
      </div>
    </div>
  </section>

</main>

<!-- ============================== STOPKA ============================== -->
<footer class="foot" id="kontakt">
  <div class="row foot-row">
    <span class="foot-mark">Project Szpont</span>
    <div class="foot-social" data-team-socials></div>
    <span class="foot-meta">© <span id="rok"></span></span>
    <span class="foot-meta" data-contact-email-wrap>Kontakt: <a data-contact-email href="#">—</a></span>
    <span class="foot-meta">Aktualizacja: <span data-last-updated>—</span></span>
  </div>
</footer>

<script src="config.js"></script>
<script src="script.js" defer></script>
<script>document.getElementById("rok").textContent = new Date().getFullYear();</script>
</body>
</html>
